name: Publish

# Publishes to npm when a GitHub Release is published, via Trusted Publishing
# (OIDC) — no NPM_TOKEN secret. The trusted publisher is configured on
# npmjs.com (package Settings → Trusted Publisher → this repo + workflow).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1 — Node 24's bundled npm already
      # satisfies this. (Do NOT `npm i -g npm@latest`: a recent npm breaks
      # provenance with "Cannot find module 'sigstore'".)
      - run: npm --version
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm publish
